<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title color="dark">Olá, Responsável</ion-title>
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon slot="icon-only" name="notifications-outline" color="dark"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <!-- Cenário 4: Seleção Rápida de Filhos -->
  <h2 class="section-title" style="color: var(--ion-color-dark)">Meus Filhos</h2>
  <ion-row>
    <ion-col size="4" class="ion-text-center">
      <ion-avatar class="child-avatar selected" style="border: 3px solid var(--ion-color-primary); margin: auto;">
        <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
      </ion-avatar>
      <ion-text color="dark"><p>Joãozinho</p></ion-text>
    </ion-col>
    <ion-col size="4" class="ion-text-center">
      <ion-avatar class="child-avatar" style="border: 2px solid transparent; margin: auto;">
        <img src="https://ionicframework.com/docs/img/demos/avatar.svg" />
      </ion-avatar>
      <ion-text color="dark"><p>Maria</p></ion-text>
    </ion-col>
    <ion-col size="4" class="ion-text-center">
      <ion-fab-button size="small" color="secondary" style="margin: auto;">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
      <ion-text color="dark"><p>Adicionar</p></ion-text>
    </ion-col>
  </ion-row>

  <!-- Cenário 3: Campanhas Ativas (Usando a cor verde primária) -->
  <h2 class="section-title" style="margin-top: 30px; color: var(--ion-color-dark)">Campanhas de Vacinação</h2>
  <ion-card style="background-color: var(--ion-color-primary); color: white;">
    <ion-card-header>
      <ion-card-subtitle style="color: white;">Campanha Nacional</ion-card-subtitle>
      <ion-card-title style="color: white;">Poliomielite</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      Crianças de 1 a menores de 5 anos devem ser vacinadas até dia 30/06.
      <br><br>
      <ion-button fill="outline" color="light" size="small">Ver postos próximos</ion-button>
    </ion-card-content>
  </ion-card>

</ion-content>
