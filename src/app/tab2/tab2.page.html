<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title color="dark">Carteira de Vacinação</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-segment value="pendentes" color="primary">
    <ion-segment-button value="pendentes">
      <ion-label>Pendentes</ion-label>
    </ion-segment-button>
    <ion-segment-button value="historico">
      <ion-label>Histórico</ion-label>
    </ion-segment-button>
  </ion-segment>

  <div class="ion-padding-top">

    <h3 style="color: var(--ion-color-tertiary); font-weight: bold; font-size: 1rem;">
      <ion-icon name="warning-outline"></ion-icon> Requer Atenção Imediata
    </h3>

    <ion-card style="background-color: var(--ion-color-tertiary); color: white; margin-bottom: 20px;">
      <ion-card-header>
        <ion-card-subtitle style="color: white; opacity: 0.9;">Atrasada há 15 dias</ion-card-subtitle>
        <ion-card-title style="color: white;">Pentavalente - 2ª Dose</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        Data prevista: 05/06/2026
        <br><br>
        <ion-button color="light" fill="solid" size="small">
          <ion-icon slot="start" name="location-outline"></ion-icon>
          Ver postos
        </ion-button>
      </ion-card-content>
    </ion-card>

    <h3 style="color: var(--ion-color-dark); font-weight: bold; font-size: 1rem; margin-top: 25px;">
      Próximas Vacinas
    </h3>

    <ion-card style="border-left: 5px solid var(--ion-color-secondary); margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
      <ion-card-header>
        <ion-card-subtitle color="secondary">Prevista para este mês</ion-card-subtitle>
        <ion-card-title color="dark" style="font-size: 1.2rem;">Poliomielite (VIP) - 3ª Dose</ion-card-title>
      </ion-card-header>
      <ion-card-content color="dark">
        Data prevista: 30/06/2026
      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
